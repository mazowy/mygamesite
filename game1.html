<!DOCTYPE html>
<html>
<head>
    <title>Jump Bird</title>
    <style>
        body {
            margin: 0;
            background: black;
        }
        canvas {
            display: block;
            margin: auto;
            background: black;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameOver = false;
let score = 0;
let particles = [];

let player = {
    x: 120,
    y: 280,
    radius: 20,
    dy: 0,
    gravity: 0.6,
    jumpPower: -12,
    grounded: true,
    wing: 0
};

let obstacle = {
    x: 800,
    y: 240,
    width: 20,
    height: 100,
    speed: 6
};

function drawGround() {
    ctx.fillStyle = "white";
    ctx.fillRect(0, 300, canvas.width, 100);
}

function drawBird() {

    player.wing += 0.2;
    let wingSize = Math.sin(player.wing) * 8;

    ctx.fillStyle = "orange";
    ctx.beginPath();
    ctx.ellipse(player.x - 10, player.y, 18, 8 + wingSize, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(player.x + 8, player.y - 5, 4, 0, Math.PI * 2);
    ctx.fill();
}

function drawLaser() {
    ctx.fillStyle = "red";
    ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
}

function createExplosion(x, y) {
    for (let i = 0; i < 25; i++) {
        particles.push({
            x: x,
            y: y,
            dx: (Math.random() - 0.5) * 6,
            dy: (Math.random() - 0.5) * 6,
            size: Math.random() * 5 + 2
        });
    }
}

function drawExplosion() {
    ctx.fillStyle = "orange";
    particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        p.size *= 0.95;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    particles = particles.filter(p => p.size > 0.5);
}

function drawRestart() {
    ctx.fillStyle = "white";
    ctx.fillRect(300, 150, 200, 60);

    ctx.fillStyle = "black";
    ctx.font = "28px Arial";
    ctx.fillText("RESTART", 340, 188);
}

function update() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGround();

    if (!gameOver) {

        player.dy += player.gravity;
        player.y += player.dy;

        if (player.y > 280) {
            player.y = 280;
            player.dy = 0;
            player.grounded = true;
        }

        obstacle.x -= obstacle.speed;

        if (obstacle.x < -obstacle.width) {
            obstacle.x = 800;
            score++;
        }

        if (
            player.x + player.radius > obstacle.x &&
            player.x - player.radius < obstacle.x + obstacle.width &&
            player.y + player.radius > obstacle.y &&
            player.y - player.radius < obstacle.y + obstacle.height
        ) {
            gameOver = true;
            createExplosion(player.x, player.y);
        }

        drawBird();
        drawLaser();

        ctx.fillStyle = "white";
        ctx.font = "20px Arial";
        ctx.fillText("Score: " + score, 20, 30);

    } else {

        drawExplosion();

        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", 250, 110);

        drawRestart();
    }

    requestAnimationFrame(update);
}

document.addEventListener("keydown", function(e) {
    if (e.code === "Space" && player.grounded && !gameOver) {
        player.dy = player.jumpPower;
        player.grounded = false;
    }
});

canvas.addEventListener("click", function(e) {

    if (!gameOver) return;

    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if (mx > 300 && mx < 500 && my > 150 && my < 210) {
        score = 0;
        obstacle.x = 800;
        player.y = 280;
        player.dy = 0;
        player.grounded = true;
        particles = [];
        gameOver = false;
    }
});

update();

</script>

</body>
</html>
