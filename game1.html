<!DOCTYPE html>
<html>
<head>
    <title>Super Jump Game</title>
    <style>
        body {
            margin: 0;
            background: #111;
            overflow: hidden;
            font-family: Arial;
            color: white;
            text-align: center;
        }
        canvas {
            background: #222;
            display: block;
            margin: auto;
            border: 2px solid white;
        }
        h1 {
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>🎮 Super Jump Game</h1>
<p>Press SPACE to jump</p>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = {
    x: 50,
    y: 300,
    width: 40,
    height: 40,
    dy: 0,
    gravity: 0.6,
    jumpPower: -12,
    grounded: true
};

let obstacle = {
    x: 800,
    y: 320,
    width: 30,
    height: 80,
    speed: 6
};

let score = 0;

function drawPlayer()
    // Body
    ctx.fillStyle = "#3498db";
    ctx.fillRect(player.x, player.y + 15, player.width, player.height - 15);

    // Head
    ctx.fillStyle = "#f1c40f";
    ctx.fillRect(player.x + 8, player.y, 24, 20);

    // Eyes
    ctx.fillStyle = "black";
    ctx.fillRect(player.x + 14, player.y + 5, 4, 4);
    ctx.fillRect(player.x + 24, player.y + 5, 4, 4);

    // Legs
    ctx.fillStyle = "#2c3e50"; // Dark blue legs
    ctx.fillRect(player.x + 8, player.y + player.height, 10, 15);
    ctx.fillRect(player.x + 22, player.y + player.height, 10, 15);
}
    // Body
    ctx.fillStyle = "#3498db";
    ctx.fillRect(player.x, player.y + 15, player.width, player.height - 15);

    // Head
    ctx.fillStyle = "#f1c40f";
    ctx.fillRect(player.x + 8, player.y, 24, 20);

    // Eyes
    ctx.fillStyle = "black";
    ctx.fillRect(player.x + 14, player.y + 5, 4, 4);
    ctx.fillRect(player.x + 24, player.y + 5, 4, 4);

    // Legs
    ctx.fillStyle = "#2c3e50"; // Dark blue legs
    ctx.fillRect(player.x + 8, player.y + player.height, 10, 15);
    ctx.fillRect(player.x + 22, player.y + player.height, 10, 15);
}
    
function drawObstacle() {
    ctx.fillStyle = "red";
    ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
}

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Gravity
    player.dy += player.gravity;
    player.y += player.dy;

    if (player.y >= 300) {
        player.y = 300;
        player.dy = 0;
        player.grounded = true;
    }

    // Move obstacle
    obstacle.x -= obstacle.speed;

    if (obstacle.x + obstacle.width < 0) {
        obstacle.x = 800;
        score++;
    }

    // Collision
    if (
        player.x < obstacle.x + obstacle.width &&
        player.x + player.width > obstacle.x &&
        player.y < obstacle.y + obstacle.height &&
        player.y + player.height > obstacle.y
    ) {
        alert("Game Over! Score: " + score);
        document.location.reload();
    }

    drawPlayer();
    drawObstacle();

    ctx.fillStyle = "white";
    ctx.fillText("Score: " + score, 700, 30);

    requestAnimationFrame(update);
}

document.addEventListener("keydown", function(e) {
    if (e.code === "Space" && player.grounded) {
        player.dy = player.jumpPower;
        player.grounded = false;
    }
});

update();
</script>

</body>
</html>
