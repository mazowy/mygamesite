<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.style.background = "black";

let gameOver = false;
let explosionParticles = [];

/* 🔊 SOUND EFFECTS */
const jumpSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-quick-jump-arcade-game-239.mp3");
const boomSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-explosion-impact-1684.mp3");

let player = { 
    x: 100, 
    y: 250, 
    width: 40, 
    height: 40, 
    dy: 0, 
    gravity: 0.6, 
    jumpPower: -12, 
    grounded: true,
    wingAngle: 0
};

let obstacle = { 
    x: 800, 
    y: 240, 
    width: 20, 
    height: 100, 
    speed: 6 
};

let score = 0;

/* ===== DRAW GROUND ===== */
function drawGround() {
    ctx.fillStyle = "white";
    ctx.fillRect(0, 300, canvas.width, 100);
}

/* ===== DRAW BIRD WITH FLAPPING WINGS ===== */
function drawBird() {

    // Wing animation
    player.wingAngle += 0.2;
    let wingOffset = Math.sin(player.wingAngle) * 10;

    // Wing
    ctx.fillStyle = "orange";
    ctx.beginPath();
    ctx.ellipse(player.x + 10, player.y + 20, 15, 8 + wingOffset, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(player.x + 20, player.y + 20, 20, 0, Math.PI * 2);
    ctx.fill();

    // Eye
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(player.x + 28, player.y + 15, 5, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = "orange";
    ctx.beginPath();
    ctx.moveTo(player.x + 40, player.y + 20);
    ctx.lineTo(player.x + 55, player.y + 15);
    ctx.lineTo(player.x + 55, player.y + 25);
    ctx.closePath();
    ctx.fill();
}

/* ===== DRAW LASER ===== */
function drawLaser() {
    ctx.fillStyle = "red";
    ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
}

/* ===== EXPLOSION EFFECT ===== */
function createExplosion(x, y) {
    for (let i = 0; i < 25; i++) {
        explosionParticles.push({
            x: x,
            y: y,
            dx: (Math.random() - 0.5) * 6,
            dy: (Math.random() - 0.5) * 6,
            radius: Math.random() * 5 + 2
        });
    }
}

function drawExplosion() {
    ctx.fillStyle = "orange";
    explosionParticles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        p.radius *= 0.95;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
    });
}

/* ===== RESTART BUTTON ===== */
function drawRestartButton() {
    ctx.fillStyle = "white";
    ctx.fillRect(300, 150, 200, 60);

    ctx.fillStyle = "black";
    ctx.font = "30px Arial";
    ctx.fillText("RESTART", 330, 190);
}

/* ===== GAME LOOP ===== */
function update() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawGround();

    if (!gameOver) {

        player.dy += player.gravity;
        player.y += player.dy;

        if (player.y > 260) {
            player.y = 260;
            player.dy = 0;
            player.grounded = true;
        }

        obstacle.x -= obstacle.speed;
        if (obstacle.x < -obstacle.width) {
            obstacle.x = 800;
            score++;
        }

        // Collision
        if (
            player.x < obstacle.x + obstacle.width &&
            player.x + player.width > obstacle.x &&
            player.y < obstacle.y + obstacle.height &&
            player.y + player.height > obstacle.y
        ) {
            gameOver = true;
            boomSound.play();
            createExplosion(player.x + 20, player.y + 20);
        }

        drawBird();
        drawLaser();

        ctx.fillStyle = "white";
        ctx.font = "20px Arial";
        ctx.fillText("Score: " + score, 20, 40);

    } else {

        drawExplosion();

        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", 250, 120);

        drawRestartButton();
    }

    requestAnimationFrame(update);
}

/* ===== CONTROLS ===== */
document.addEventListener("keydown", function(e) {
    if (e.code === "Space" && player.grounded && !gameOver) {
        player.dy = player.jumpPower;
        player.grounded = false;
        jumpSound.play();
    }
});

/* ===== RESTART CLICK ===== */
canvas.addEventListener("click", function(e) {
    if (gameOver) {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        if (mouseX > 300 && mouseX < 500 && mouseY > 150 && mouseY < 210) {
            score = 0;
            obstacle.x = 800;
            player.y = 260;
            player.dy = 0;
            gameOver = false;
            explosionParticles = [];
        }
    }
});

update();

</script>
