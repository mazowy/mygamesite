<!DOCTYPE html>
<html>
<head>
    <title>Jumping Bird Pro</title>

    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
        }

        canvas {
            display: block;
            margin: auto;
            background: black;
        }
    </style>
</head>

<body>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

/* ================== GAME STATE ================== */

let gameOver = false;
let score = 0;
let explosionParticles = [];

/* ================== SOUND ================== */

const jumpSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.wav");
const boomSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-explosion-2759.wav");

/* ================== PLAYER ================== */

let player = {
    x: 120,
    y: 260,
    radius: 20,
    dy: 0,
    gravity: 0.6,
    jumpPower: -12,
    grounded: true,
    wingPhase: 0
};

/* ================== OBSTACLE ================== */

let obstacle = {
    x: 800,
    y: 240,
    width: 20,
    height: 100,
    speed: 6
};

/* ================== DRAW FUNCTIONS ================== */

function drawGround() {
    ctx.fillStyle = "white";
    ctx.fillRect(0, 300, canvas.width, 100);
}

function drawBird() {

    // Wing animation
    player.wingPhase += 0.25;
    let wingSize = Math.sin(player.wingPhase) * 8;

    // Wing
    ctx.fillStyle = "orange";
    ctx.beginPath();
    ctx.ellipse(player.x - 10, player.y, 18, 8 + wingSize, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fill();

    // Eye
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(player.x + 8, player.y - 5, 4, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = "orange";
    ctx.beginPath();
    ctx.moveTo(player.x + 20, player.y);
    ctx.lineTo(player.x + 35, player.y - 5);
    ctx.lineTo(player.x + 35, player.y + 5);
    ctx.closePath();
    ctx.fill();
}

function drawLaser() {
    ctx.fillStyle = "red";
    ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
}

function drawScore() {
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 20, 30);
}

/* ================== EXPLOSION ================== */

function createExplosion(x, y) {
    for (let i = 0; i < 30; i++) {
        explosionParticles.push({
            x: x,
            y: y,
            dx: (Math.random() - 0.5) * 8,
            dy: (Math.random() - 0.5) * 8,
            size: Math.random() * 6 + 2
        });
    }
}

function drawExplosion() {
    ctx.fillStyle = "orange";
    explosionParticles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        p.size *= 0.95;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    explosionParticles = explosionParticles.filter(p => p.size > 0.5);
}

/* ================== RESTART BUTTON ================== */

function drawRestartButton() {
    ctx.fillStyle = "white";
    ctx.fillRect(300, 150, 200, 60);

    ctx.fillStyle = "black";
    ctx.font = "28px Arial";
    ctx.fillText("RESTART", 340, 188);
}

/* ================== GAME LOOP ================== */

function update() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGround();

    if (!gameOver) {

        // Physics
        player.dy += player.gravity;
        player.y += player.dy;

        if (player.y > 280) {
            player.y = 280;
            player.dy = 0;
            player.grounded = true;
        }

        // Move obstacle
        obstacle.x -= obstacle.speed;

        if (obstacle.x < -obstacle.width) {
            obstacle.x = 800;
            score++;
        }

        // Collision
        if (
            player.x + player.radius > obstacle.x &&
            player.x - player.radius < obstacle.x + obstacle.width &&
            player.y + player.radius > obstacle.y &&
            player.y - player.radius < obstacle.y + obstacle.height
        ) {
            gameOver = true;
            boomSound.currentTime = 0;
            boomSound.play().catch(()=>{});
            createExplosion(player.x, player.y);
        }

        drawBird();
        drawLaser();
        drawScore();

    } else {

        drawExplosion();

        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", 250, 110);

        drawRestartButton();
    }

    requestAnimationFrame(update);
}

/* ================== CONTROLS ================== */

document.addEventListener("keydown", function(e) {

    if (e.code === "Space" && player.grounded && !gameOver) {

        player.dy = player.jumpPower;
        player.grounded = false;

        jumpSound.currentTime = 0;
        jumpSound.play().catch(()=>{});
    }
});

/* ================== RESTART ================== */

canvas.addEventListener("click", function(e) {

    if (!gameOver) return;

    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    if (mouseX > 300 && mouseX < 500 && mouseY > 150 && mouseY < 210) {

        // Reset everything
        score = 0;
        obstacle.x = 800;
        player.y = 280;
        player.dy = 0;
        player.grounded = true;
        explosionParticles = [];
        gameOver = false;
    }
});

/* ================== START GAME ================== */

update();

</script>

</body>
</html>
