<!DOCTYPE html>
<html>
<head>
    <title>Bird Laser Game</title>
    <style>
        body {
            margin: 0;
            background: black;
        }

        canvas {
            display: block;
            margin: auto;
            background: black;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let score = 0;
let gameOver = false;
let promotionLevel = 0;

let player = {
    x: 120,
    y: 280,
    radius: 20,
    dy: 0,
    gravity: 0.6,
    jumpPower: -12,
    grounded: true,
    wing: 0
};

let obstacle = {
    x: 800,
    y: 240,
    width: 20,
    height: 100,
    speed: 6
};

/* ================= DRAW FUNCTIONS ================= */

function drawGround() {
    ctx.fillStyle = "white";
    ctx.fillRect(0, 300, canvas.width, 100);
}

function drawBird() {

    player.wing += 0.2;
    let wingSize = Math.sin(player.wing) * 8;

    // Wing
    ctx.fillStyle = "orange";
    ctx.beginPath();
    ctx.ellipse(player.x - 10, player.y, 18, 8 + wingSize, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fill();

    // Eye
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(player.x + 8, player.y - 5, 4, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = "orange";
    ctx.beginPath();
    ctx.moveTo(player.x + 20, player.y);
    ctx.lineTo(player.x + 35, player.y - 5);
    ctx.lineTo(player.x + 35, player.y + 5);
    ctx.closePath();
    ctx.fill();
}

function drawLaser() {
    ctx.fillStyle = "red";
    ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
}

function drawScore() {
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 20, 30);
}

function drawRestartButton() {
    ctx.fillStyle = "white";
    ctx.fillRect(300, 150, 200, 60);

    ctx.fillStyle = "black";
    ctx.font = "28px Arial";
    ctx.fillText("RESTART", 340, 188);
}

/* ================= GAME LOOP ================= */

function update() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawGround();

    if (!gameOver) {

        // Physics
        player.dy += player.gravity;
        player.y += player.dy;

        if (player.y > 280) {
            player.y = 280;
            player.dy = 0;
            player.grounded = true;
        }

        // Move laser
        obstacle.x -= obstacle.speed;

        if (obstacle.x < -obstacle.width) {
            obstacle.x = 800;
            score++;

            // Promotion every 10 score
            if (score % 10 === 0) {
                promotionLevel++;
                obstacle.speed += 1;   // Laser gets faster
                alert("🔥 PROMOTION! Level " + promotionLevel + "\nLaser Speed Increased!");
            }
        }

        // Collision
        if (
            player.x + player.radius > obstacle.x &&
            player.x - player.radius < obstacle.x + obstacle.width &&
            player.y + player.radius > obstacle.y &&
            player.y - player.radius < obstacle.y + obstacle.height
        ) {
            gameOver = true;
        }

        drawBird();
        drawLaser();
        drawScore();

    } else {

        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", 250, 110);

        drawRestartButton();
    }

    requestAnimationFrame(update);
}

/* ================= CONTROLS ================= */

document.addEventListener("keydown", function(e) {
    if (e.code === "Space" && player.grounded && !gameOver) {
        player.dy = player.jumpPower;
        player.grounded = false;
    }
});

/* ================= RESTART ================= */

canvas.addEventListener("click", function(e) {

    if (!gameOver) return;

    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if (mx > 300 && mx < 500 && my > 150 && my < 210) {

        score = 0;
        promotionLevel = 0;
        obstacle.speed = 6;
        obstacle.x = 800;
        player.y = 280;
        player.dy = 0;
        player.grounded = true;
        gameOver = false;
    }
});

update();

</script>

</body>
</html>
